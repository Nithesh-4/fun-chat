version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: funchat-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: funchat_secure_pass_123
      POSTGRES_DB: funchat
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: funchat-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
